<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Flashcards Pedagógicos</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 20px;
    margin: 0;
}

/* Title */
h2 {
    margin: 0;
}

/* Wrapper (tilt layer) */
.card-wrapper {
    perspective: 1200px;
    margin-bottom: min(10vh, 80px); /* ✅ FIXED spacing */
}

/* Card (flip layer) */
.card {
    width: 360px;
    height: 230px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s;
}

/* Flip */
.card.flip {
    transform: rotateY(180deg);
}

/* Faces */
.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
    backface-visibility: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.front {
    background: linear-gradient(135deg, #3b82f6, #1e40af);
    color: white;
}

.back {
    background: linear-gradient(135deg, #16a34a, #065f46);
    color: white;
    transform: rotateY(180deg);
}

/* ✨ Glare (fixed, no clipping) */
.glare {
    position: absolute;
    width: 180%;
    height: 180%;
    top: -40%;
    left: -40%;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;

    background: linear-gradient(
        120deg,
        transparent 35%,
        rgba(255,255,255,0.15) 45%,
        rgba(255,255,255,0.4) 50%,
        rgba(255,255,255,0.15) 55%,
        transparent 65%
    );

    filter: blur(6px);
    transition: opacity 0.2s;
}

/* Buttons */
.controls {
    display: flex;
    gap: 20px;
}

button {
    padding: 12px 25px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #facc15, #f97316);
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: transform 0.2s;
}

button:hover {
    transform: scale(1.1);
}

/* Sparkles */
.sparkle-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
}

.sparkle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: gold;
    border-radius: 50%;
    box-shadow: 0 0 10px gold;
    animation: sparkle 1s forwards;
}

@keyframes sparkle {
    0% {opacity: 1; transform: scale(1) translate(0,0);}
    100% {opacity: 0; transform: scale(0.3) translate(var(--dx), var(--dy));}
}
</style>
</head>

<body>

<h2>Flashcards Pedagógicos</h2>

<div class="card-wrapper" id="wrapper">
    <div class="card" id="card">
        <div class="card-face front" id="front"></div>
        <div class="card-face back" id="back"></div>
        <div class="glare" id="glare"></div>
    </div>
</div>

<div class="controls">
    <button onclick="prevCard()">Anterior</button>
    <button onclick="nextCard()">Próximo</button>
</div>

<div class="sparkle-layer" id="sparkleLayer"></div>

<script>
const cards = [
    {
        question: "Qual é o papel do formador?",
        answer: "Facilitar a aprendizagem e adaptar estratégias."
    },
    {
        question: "O que é aprendizagem significativa?",
        answer: "Ligação com conhecimentos prévios."
    },
    {
        question: "Para que serve o feedback?",
        answer: "Melhorar desempenho e promover reflexão."
    }
];

cards.sort(() => Math.random() - 0.5);

let current = 0;

const card = document.getElementById("card");
const wrapper = document.getElementById("wrapper");
const front = document.getElementById("front");
const back = document.getElementById("back");
const glare = document.getElementById("glare");
const sparkleLayer = document.getElementById("sparkleLayer");

/* Render */
function renderCard() {
    front.textContent = cards[current].question;
    back.textContent = cards[current].answer;
    card.classList.remove("flip");
}

/* Flip */
card.addEventListener("click", () => {
    card.classList.toggle("flip");
    createSparkles();
});

/* Navigation */
function nextCard() {
    current = (current + 1) % cards.length;
    renderCard();
}
function prevCard() {
    current = (current - 1 + cards.length) % cards.length;
    renderCard();
}

/* Sparkles */
function createSparkles() {
    const rect = card.getBoundingClientRect();

    for (let i = 0; i < 20; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";

        s.style.left = `${rect.left + rect.width/2}px`;
        s.style.top = `${rect.top + rect.height/2}px`;

        s.style.setProperty("--dx", `${Math.random()*300-150}px`);
        s.style.setProperty("--dy", `${Math.random()*300-150}px`);

        sparkleLayer.appendChild(s);
        setTimeout(() => s.remove(), 1000);
    }
}

/* Tilt + glare */
wrapper.addEventListener("mousemove", (e) => {
    const rect = wrapper.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const rotateX = -(y - rect.height/2) / 10;
    const rotateY = (x - rect.width/2) / 10;

    wrapper.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

    glare.style.opacity = 1;
    glare.style.transform = `translate(${(x - rect.width/2)/6}px, ${(y - rect.height/2)/6}px)`;
});

wrapper.addEventListener("mouseleave", () => {
    wrapper.style.transform = "rotateX(0) rotateY(0)";
    glare.style.opacity = 0;
});

/* Init */
renderCard();
</script>

</body>
</html>
