<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Quem quer ser formador?</title>
  <style>
    :root {
      --primary-blue: #0b0f2a;
      --accent-gold: #e2b04a;
      --border-blue: #3949ab;
      --glass-bg: linear-gradient(to bottom, #101642, #000);
      --error-red: #ff4d4d;
      --safe-green: #32cd32;
      --mil-orange: #ff9800;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      /* Deep Studio Background with Spotlight */
      background: radial-gradient(circle at center, #1a237e 0%, #050505 80%, #000 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Studio Texture: Subtle Grid and Scanlines */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(rgba(0, 0, 0, 0.2) 50%, transparent 50%);
      background-size: 30px 30px, 30px 30px, 100% 4px;
      pointer-events: none;
      z-index: 1;
    }

    .header-title {
      position: absolute;
      top: 4vh;
      text-align: center;
      width: 100%;
      z-index: 10;
    }

    /* Original Title Style - Capsule Look */
    .header-title h1 {
      font-size: 38px;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 15px var(--border-blue);
      border-top: 3px solid var(--accent-gold);
      border-bottom: 3px solid var(--accent-gold);
      display: inline-block;
      padding: 15px 50px;
      border-radius: 100px;
      background: rgba(0,0,0,0.7);
    }

    .lifelines {
      position: absolute;
      left: 50px;
      top: 50%;
      transform: translateY(-50%);
      display: none; 
      flex-direction: column;
      gap: 20px;
      z-index: 20;
    }

    /* Restored Glowing Circular Lifeline Buttons */
    .lifeline-btn {
      width: 70px;
      height: 70px;
      background: radial-gradient(circle, #0c134f, #000);
      border: 2px solid var(--white);
      color: #fff;
      border-radius: 50%;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.6s ease, transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 0 15px var(--border-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--border-blue);
    }

    .lifeline-btn:hover:not(:disabled) {
      transform: scale(1.1);
      box-shadow: 0 0 20px var(--accent-gold);
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }

    .lifeline-btn:disabled {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.8);
    }

    .game-box {
      width: 900px;
      padding: 40px;
      text-align: center;
      position: relative;
      z-index: 5;
    }

    #timer-display {
      font-size: 32px;
      font-weight: bold;
      color: var(--accent-gold);
      border: 4px solid var(--accent-gold);
      width: 75px;
      height: 75px;
      line-height: 75px;
      border-radius: 50%;
      margin: 0 auto 30px auto;
      background: rgba(0,0,0,0.9);
      box-shadow: 0 0 25px rgba(226, 176, 74, 0.5);
    }

    .question-text {
      font-size: 26px;
      padding: 30px 60px;
      background: linear-gradient(to bottom, #101642, #000);
      border: 2px solid var(--border-blue);
      margin-bottom: 40px;
      clip-path: polygon(5% 0%, 95% 0%, 100% 50%, 95% 100%, 5% 100%, 0% 50%);
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
    }

    .answers button {
      background: linear-gradient(to bottom, #0c134f, #000);
      border: 2px solid var(--border-blue);
      padding: 18px 45px;
      color: white;
      font-size: 18px;
      text-align: left;
      cursor: pointer;
      transition: 0.2s;
      clip-path: polygon(7% 0%, 93% 0%, 100% 50%, 93% 100%, 7% 100%, 0% 50%);
    }

    .answers button:hover:not(.hide-opt) {
      background: var(--mil-orange);
      color: #000;
      border-color: #fff;
    }

    .btn-action {
      background: var(--accent-gold);
      border: none;
      padding: 15px 50px;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      border-radius: 40px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 15px var(--accent-gold);
    }

    .hide-opt { opacity: 0; pointer-events: none; transition: opacity 0.4s; }
    .display-none { display: none !important; }

    input {
      padding: 15px;
      font-size: 20px;
      margin-bottom: 30px;
      text-align: center;
      width: 50%;
      border-radius: 10px;
      border: 2px solid var(--accent-gold);
      background: #000;
      color: #fff;
    }

    .review-container {
      margin-top: 20px;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      padding: 20px;
      background: rgba(0,0,0,0.7);
      border-radius: 10px;
      border: 1px solid var(--border-blue);
    }

    .review-item { border-bottom: 1px solid #333; padding: 10px 0; }
    .review-q { color: #aaa; font-size: 14px; margin: 0; }
    .review-a { color: var(--safe-green); font-size: 16px; font-weight: bold; margin: 5px 0 0 0; }
    
    .congrats-gold {
      color: var(--accent-gold);
      font-size: 40px;
      text-shadow: 0 0 15px var(--accent-gold);
    }

    .confetti {
      position: fixed;
      width: 8px; height: 8px; top: -20px; z-index: 999;
      pointer-events: none;
      animation: fall linear forwards;
    }

    @keyframes fall { 100% { transform: translateY(110vh) rotate(360deg); } }
  </style>
</head>
<body>

<div class="header-title">
  <h1>Quem quer ser formador?</h1>
</div>

<div class="lifelines" id="lifelineContainer">
  <button class="lifeline-btn" id="btn5050" onclick="use5050()">50:50</button>
</div>

<div id="startScreen" class="game-box">
  <h2>Bem-vindo ao Desafio</h2>
  <p>Estás preparado para testar os teus conhecimentos em Serious Games?</p>
  <br>
  <button class="btn-action" onclick="initGame()">Começar Teste</button>
</div>

<div id="quizContainer" class="game-box display-none">
  <div id="timer-display">30</div>
  <div id="question" class="question-text">A carregar...</div>
  <div id="answers" class="answers"></div>
</div>

<div id="passwordOverlay" class="game-box display-none">
  <h2 id="passTitle">Nível Bloqueado</h2>
  <p>Introduza a palavra-passe para avançar:</p>
  <input type="password" id="passwordInput" placeholder="Palavra-passe...">
  <br>
  <button class="btn-action" id="passwordButton">Confirmar</button>
</div>

<div id="winScreen" class="game-box display-none">
  <div id="winAmount" style="font-size: 28px; font-weight: bold; margin-bottom: 20px;"></div>
  <div id="reviewSection" class="review-container display-none"></div>
  <br>
  <button class="btn-action" onclick="location.reload()">Recomeçar Desafio</button>
</div>

<script>
  // Game Logic strictly preserved
  const questions = [
    { q: "Um serious game é:", a: ["Um jogo que se joga a fazer cara séria.", "Um jogo desenvolvido para outros fins que não o entertenimento.", "Qualquer jogo para adultos.", "Um jogo com alto nível de dificuldade."], correct: 1 },
    { q: "A neuroplasticidade é potenciada com vídeojogos através de:", a: ["Foco Hiper-Direcionado", "Repetição de tarefas", "A combinação de todas as outras opções", "Recompensa imediata (dopamina)"], correct: 2 },
    { q: "O primeiro jogo validado enquanto terapia sujeita a prescrição médica foi", a: ["Tetris", "Minecraft", "EndeavorRX", "Autist AI"], correct: 2 },
    { q: "Qual destes representa uma vantagem das terapias digitais?", a: ["Não tem efeitos colaterais", "Ambiente e Exposição controlados", "Permite tratar sem a presença de um profissional.", "Basta apenas uma sessão para a cura"], correct: 1 },
    { q: "Qual é a reação da amígdala perante a realidade virtual?", a: ["Distingue facilmente a realidade da simulação", "Gera respostas emocionais autênticas", "Bloqueia", "Ignora os inputs virtuais."], correct: 1 }
  ];

  const passwords = ["charlie", "foxtrot", "papa", "india", "foxtrot"];
  const totalQuestions = questions.length;
  
  let current = 0;
  let correctAnswers = 0;
  let wrongAnswersList = []; 
  let timeLeft = 30;
  let timerInterval;
  let hasUsed5050 = false;
  let currentQuestionOptions = [];

  const startScreen = document.getElementById('startScreen');
  const quizContainer = document.getElementById('quizContainer');
  const passwordOverlay = document.getElementById('passwordOverlay');
  const winScreen = document.getElementById('winScreen');
  const timerDisplay = document.getElementById('timer-display');
  const passwordInput = document.getElementById('passwordInput');
  const passwordBtn = document.getElementById('passwordButton');
  const btn5050 = document.getElementById('btn5050');
  const lifelineContainer = document.getElementById('lifelineContainer');

  function initGame() {
    startScreen.classList.add('display-none');
    if (passwords[current]) {
      showPassword();
    } else {
      loadQuestion();
    }
  }

  function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 30;
    timerDisplay.innerText = timeLeft;
    timerDisplay.style.color = "var(--accent-gold)";
    timerInterval = setInterval(() => {
      timeLeft--;
      timerDisplay.innerText = timeLeft;
      if (timeLeft <= 10) timerDisplay.style.color = "var(--error-red)";
      if (timeLeft <= 0) {
        const qData = questions[current];
        wrongAnswersList.push({ q: qData.q, correct: qData.a[qData.correct] });
        handleNextStep();
      }
    }, 1000);
  }

  function loadQuestion() {
    quizContainer.classList.remove('display-none');
    passwordOverlay.classList.add('display-none');
    winScreen.classList.add('display-none');
    lifelineContainer.style.display = 'flex';

    const qData = questions[current];
    document.getElementById('question').innerText = qData.q;
    currentQuestionOptions = qData.a.map((text, index) => ({ text: text, isCorrect: (index === qData.correct) }));
    
    for (let i = currentQuestionOptions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [currentQuestionOptions[i], currentQuestionOptions[j]] = [currentQuestionOptions[j], currentQuestionOptions[i]];
    }

    const answersDiv = document.getElementById('answers');
    answersDiv.innerHTML = '';

    currentQuestionOptions.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.innerHTML = `<span style="color:var(--accent-gold); font-weight:bold;">${["A", "B", "C", "D"][i]}:</span> ${opt.text}`;
      btn.id = `opt-${i}`;
      btn.onclick = () => {
        if (opt.isCorrect) {
          correctAnswers++;
        } else {
          wrongAnswersList.push({ q: qData.q, correct: qData.a[qData.correct] });
        }
        handleNextStep();
      };
      answersDiv.appendChild(btn);
    });
    startTimer();
  }

  function use5050() {
    if (hasUsed5050) return;
    hasUsed5050 = true;
    btn5050.disabled = true; 
    let incorrectIndices = [];
    currentQuestionOptions.forEach((opt, idx) => { if (!opt.isCorrect) incorrectIndices.push(idx); });
    incorrectIndices.sort(() => Math.random() - 0.5);
    incorrectIndices.slice(0, 2).forEach(idx => document.getElementById(`opt-${idx}`).classList.add('hide-opt'));
  }

  function handleNextStep() {
    clearInterval(timerInterval);
    current++;
    if (current >= totalQuestions) {
      showFinalResult();
    } else {
      if (passwords[current]) {
        showPassword();
      } else {
        loadQuestion();
      }
    }
  }

  function showPassword() {
    quizContainer.classList.add('display-none');
    passwordOverlay.classList.remove('display-none');
    lifelineContainer.style.display = 'none';
    document.getElementById('passTitle').innerText = (current === 0) ? "Acesso Inicial" : "Nível Bloqueado";
    passwordInput.value = '';
    passwordInput.focus();
  }

  passwordBtn.addEventListener('click', () => {
    if (passwordInput.value.trim().toLowerCase() === passwords[current]) {
      loadQuestion();
    } else {
      alert('Palavra-passe incorreta!');
    }
  });

  passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') passwordBtn.click(); });

  function showFinalResult() {
    quizContainer.classList.add('display-none');
    passwordOverlay.classList.add('display-none');
    lifelineContainer.style.display = 'none';
    winScreen.classList.remove('display-none');
    
    const display = document.getElementById('winAmount');
    const reviewSection = document.getElementById('reviewSection');
    let message = `Acertaste ${correctAnswers} perguntas de ${totalQuestions}`;
    
    if (correctAnswers === 5) {
      display.classList.add('congrats-gold');
      message = "PARABÉNS!<br>Acertaste em todas as perguntas";
      createConfetti();
    }
    display.innerHTML = message;

    if (wrongAnswersList.length > 0) {
      reviewSection.classList.remove('display-none');
      let reviewHTML = '<p style="color:var(--accent-gold); margin-top:0;">Revisão de Erros:</p>';
      wrongAnswersList.forEach(item => {
        reviewHTML += `<div class="review-item"><p class="review-q"><strong>Pergunta:</strong> ${item.q}</p><p class="review-a"><strong>Correção:</strong> ${item.correct}</p></div>`;
      });
      reviewSection.innerHTML = reviewHTML;
    }
  }

  function createConfetti() {
    const goldPalette = ['#ffd700', '#f6d242', '#b8860b', '#fff3a0', '#e2b04a'];
    for (let i = 0; i < 100; i++) {
      const conf = document.createElement('div');
      conf.classList.add('confetti');
      conf.style.left = Math.random() * 100 + 'vw';
      conf.style.backgroundColor = goldPalette[Math.floor(Math.random() * goldPalette.length)];
      conf.style.animationDuration = (Math.random() * 3 + 3) + 's';
      document.body.appendChild(conf);
      setTimeout(() => conf.remove(), 6000);
    }
  }
</script>

</body>
</html>
