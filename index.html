<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Quem quer ser formador?</title>
  <style>
    :root {
      --primary-blue: #0b0f2a;
      --accent-gold: #e2b04a;
      --border-blue: #3949ab;
      --glass-bg: linear-gradient(to bottom, #101642, #000);
      --error-red: #ff4d4d;
      --warn-orange: #ffa500;
      --warn-yellow: #ffff00;
      --safe-green: #32cd32;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle, #1a237e, #020205);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .header-title {
      position: absolute;
      top: 4vh;
      text-align: center;
      width: 100%;
      z-index: 10;
    }

    .header-title h1 {
      font-size: 38px;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 15px var(--border-blue);
      border-top: 3px solid var(--accent-gold);
      border-bottom: 3px solid var(--accent-gold);
      display: inline-block;
      padding: 15px 50px;
      border-radius: 100px;
      background: rgba(0,0,0,0.5);
    }

    .lifelines {
      position: absolute;
      left: 50px;
      top: 50%;
      transform: translateY(-50%);
      display: none; /* Hidden until game starts */
      flex-direction: column;
      gap: 20px;
      z-index: 20;
    }

    .lifeline-btn {
      width: 80px;
      height: 50px;
      background: #000;
      border: 2px solid var(--accent-gold);
      color: var(--accent-gold);
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .lifeline-btn:hover:not(:disabled) {
      background: var(--accent-gold);
      color: #000;
    }

    .lifeline-btn:disabled {
      border-color: #555;
      color: #555;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .game-box {
      width: 850px;
      padding: 50px 40px;
      border: 3px solid #fff;
      border-radius: 60px;
      background: var(--glass-bg);
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.7);
      margin-top: 120px;
      position: relative;
      z-index: 5;
    }

    #timer-display {
      font-size: 32px;
      font-weight: bold;
      color: var(--accent-gold);
      border: 4px solid var(--accent-gold);
      width: 80px;
      height: 80px;
      line-height: 80px;
      border-radius: 50%;
      margin: 0 auto 30px auto;
      background: rgba(0,0,0,0.7);
    }

    .question-text {
      font-size: 28px;
      margin-bottom: 40px;
      line-height: 1.4;
      min-height: 80px;
    }

    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .answers button, .btn-action {
      background: #000;
      border: 2px solid var(--border-blue);
      padding: 15px 25px;
      color: white;
      font-size: 18px;
      text-align: left;
      cursor: pointer;
      border-radius: 40px;
      transition: 0.2s;
    }

    .answers button:hover:not(.hide-opt), .btn-action:hover {
      background: var(--accent-gold);
      color: #000;
      border-color: #fff;
    }

    .hide-opt { opacity: 0; pointer-events: none; }
    .display-none { display: none !important; }

    input {
      padding: 15px;
      font-size: 20px;
      margin-bottom: 30px;
      text-align: center;
      width: 60%;
      border-radius: 10px;
      border: 2px solid var(--accent-gold);
      background: #000;
      color: #fff;
    }

    .btn-action {
      display: inline-block;
      text-align: center;
      width: auto;
      padding: 15px 60px;
      text-transform: uppercase;
      font-weight: bold;
    }

    .result-text {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .congrats-gold {
      color: var(--accent-gold) !important;
      font-size: 44px;
      text-shadow: 0 0 5px #fff, 0 0 10px var(--accent-gold);
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -20px;
      z-index: 999;
      pointer-events: none;
      animation: fall linear forwards;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(125vh) rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="header-title">
  <h1>Quem quer ser formador?</h1>
</div>

<div class="lifelines" id="lifelineContainer">
  <button class="lifeline-btn" id="btn5050" onclick="use5050()">50:50</button>
</div>

<div id="startScreen" class="game-box">
  <h2>Bem-vindo ao Desafio</h2>
  <p>Estás preparado para testar os teus conhecimentos?</p>
  <br>
  <button class="btn-action" onclick="initGame()">Começar Jogo</button>
</div>

<div id="quizContainer" class="game-box display-none">
  <div id="timer-display">30</div>
  <div id="question" class="question-text">A carregar...</div>
  <div id="answers" class="answers"></div>
</div>

<div id="passwordOverlay" class="game-box display-none">
  <h2 id="passTitle">Nível Bloqueado</h2>
  <p>Introduza a palavra-passe para avançar:</p>
  <input type="password" id="passwordInput" placeholder="Palavra-passe...">
  <br>
  <button class="btn-action" id="passwordButton">Confirmar</button>
</div>

<div id="winScreen" class="game-box display-none">
  <div id="winAmount" class="result-text"></div>
  <button class="btn-action" onclick="location.reload()">Recomeçar Desafio</button>
</div>

<script>
  const questions = [
    { q: "Um serious game é:", a: ["Um jogo que se joga a fazer cara séria.", "Um jogo desenvolvido para outros fins que não o entertenimento.", "Qualquer jogo para adultos.", "Um jogo com alto nível de dificuldade."], correct: 1 },
    { q: "A neuroplasticidade é potenciada com vídeojogos através de:?", a: ["Foco Hiper-Direcionado", "Repetição de tarefas", "A combinação de todas as outras opções", "Recompensa imediata (dopamina)"], correct: 2 },
    { q: "O primeiro jogo validado enquanto terapia sujeita a prescrição médica foi", a: ["Tetris", "Minecraft", "EndeavorRX", "Autist AI"], correct: 2 },
    { q: "Qual destes representa uma vantagem das terapias digitais?", a: ["Não tem efeitos colaterais", "Ambiente e Exposição controlados", "Permite tratar sem a presença de um profissional.", "Basta apenas uma sessão para a cura"], correct: 1 },
    { q: "Qual é a reação da amígdala perante a realidade virtual?", a: ["Distingue facilmente a realidade da simulação", "Gera respostas emocionais autênticas", "Bloqueia", "Ignora os inputs virtuais."], correct: 1 }
  ];

  // Added "start" as the first password
  const passwords = ["charlie", "foxtrot", "papa", "india", "foxtrot"];
  const totalQuestions = questions.length;
  
  let current = 0;
  let correctAnswers = 0;
  let timeLeft = 30;
  let timerInterval;
  let hasUsed5050 = false;
  let currentQuestionOptions = [];

  const startScreen = document.getElementById('startScreen');
  const quizContainer = document.getElementById('quizContainer');
  const passwordOverlay = document.getElementById('passwordOverlay');
  const winScreen = document.getElementById('winScreen');
  const timerDisplay = document.getElementById('timer-display');
  const passwordInput = document.getElementById('passwordInput');
  const passwordBtn = document.getElementById('passwordButton');
  const btn5050 = document.getElementById('btn5050');
  const lifelineContainer = document.getElementById('lifelineContainer');

  function initGame() {
    startScreen.classList.add('display-none');
    // Check if the first question has a password
    if (passwords[current]) {
      showPassword();
    } else {
      loadQuestion();
    }
  }

  function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 30;
    timerDisplay.innerText = timeLeft;
    timerDisplay.style.color = "var(--accent-gold)";

    timerInterval = setInterval(() => {
      timeLeft--;
      timerDisplay.innerText = timeLeft;
      if (timeLeft <= 10) timerDisplay.style.color = "var(--error-red)";
      if (timeLeft <= 0) handleNextStep();
    }, 1000);
  }

  function loadQuestion() {
    quizContainer.classList.remove('display-none');
    passwordOverlay.classList.add('display-none');
    winScreen.classList.add('display-none');
    lifelineContainer.style.display = 'flex';

    const qData = questions[current];
    document.getElementById('question').innerText = qData.q;
    
    currentQuestionOptions = qData.a.map((text, index) => ({ text: text, isCorrect: (index === qData.correct) }));
    for (let i = currentQuestionOptions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [currentQuestionOptions[i], currentQuestionOptions[j]] = [currentQuestionOptions[j], currentQuestionOptions[i]];
    }

    const answersDiv = document.getElementById('answers');
    answersDiv.innerHTML = '';

    currentQuestionOptions.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.innerText = `${["A", "B", "C", "D"][i]}: ${opt.text}`;
      btn.id = `opt-${i}`;
      btn.onclick = () => {
        if (opt.isCorrect) correctAnswers++;
        handleNextStep();
      };
      answersDiv.appendChild(btn);
    });
    startTimer();
  }

  function use5050() {
    if (hasUsed5050) return;
    hasUsed5050 = true;
    btn5050.disabled = true;
    let incorrectIndices = [];
    currentQuestionOptions.forEach((opt, idx) => { if (!opt.isCorrect) incorrectIndices.push(idx); });
    incorrectIndices.sort(() => Math.random() - 0.5);
    incorrectIndices.slice(0, 2).forEach(idx => document.getElementById(`opt-${idx}`).classList.add('hide-opt'));
  }

  function handleNextStep() {
    clearInterval(timerInterval);
    current++;
    if (current >= totalQuestions) {
      showFinalResult();
    } else {
      if (passwords[current]) {
        showPassword();
      } else {
        loadQuestion();
      }
    }
  }

  function showPassword() {
    quizContainer.classList.add('display-none');
    passwordOverlay.classList.remove('display-none');
    lifelineContainer.style.display = 'none';
    
    // Change title if it's the very first barrier
    document.getElementById('passTitle').innerText = (current === 0) ? "Acesso Inicial" : "Nível Bloqueado";
    
    passwordInput.value = '';
    passwordInput.focus();
  }

  passwordBtn.addEventListener('click', () => {
    if (passwordInput.value.trim().toLowerCase() === passwords[current]) {
      loadQuestion();
    } else {
      alert('Palavra-passe incorreta!');
    }
  });

  passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') passwordBtn.click(); });

  function createConfetti() {
    const goldPalette = ['#ffd700', '#f6d242', '#b8860b', '#fff3a0', '#e2b04a'];
    for (let i = 0; i < 100; i++) {
      const conf = document.createElement('div');
      conf.classList.add('confetti');
      conf.style.left = Math.random() * 100 + 'vw';
      conf.style.backgroundColor = goldPalette[Math.floor(Math.random() * goldPalette.length)];
      const duration = (Math.random() * 3 + 3);
      conf.style.animationDuration = duration + 's';
      conf.style.animationDelay = (Math.random() * 2) + 's';
      document.body.appendChild(conf);
      setTimeout(() => conf.remove(), 6000);
    }
  }

  function showFinalResult() {
    quizContainer.classList.add('display-none');
    passwordOverlay.classList.add('display-none');
    lifelineContainer.style.display = 'none';
    winScreen.classList.remove('display-none');
    
    const display = document.getElementById('winAmount');
    let message = `Acertaste ${correctAnswers} perguntas em ${totalQuestions}`;
    if (correctAnswers === 0) display.style.color = "var(--error-red)";
    else if (correctAnswers <= 2) display.style.color = "var(--warn-orange)";
    else if (correctAnswers === 3) display.style.color = "var(--warn-yellow)";
    else if (correctAnswers === 4) display.style.color = "var(--safe-green)";
    else if (correctAnswers === 5) {
      display.classList.add('congrats-gold');
      message = "PARABÉNS!<br>Acertaste em todas as perguntas";
      createConfetti();
    }
    display.innerHTML = message;
  }
</script>

</body>
</html>
